services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend_net
  backend:
    build: ./backend
    depends_on:
      - database
    environment:
      DB_HOST: 'database'
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 5432
    networks:
      - frontend_net
      - backend_net
  database:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
volumes:
  db_data:
networks:
  frontend_net:
  backend_net:
    internal: true

