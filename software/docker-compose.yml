services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend_net
  backend:
    build: ./backend
    depends_on:
      - database
    networks:
      - frontend_net
      - backend_net
  database:
    image: postgres:18.3
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
volumes:
  db_data:
networks:
  frontend_net:
  backend_net:
    internal: true