name: App deploy

on:
    workflow_dispatch:
    push:
        paths:
        - "software/**"
        branches:
        - main
    pull_request:
        paths:
        - "software/**"
        branches:
        - main
    workflow_run:
        workflows: ["Terraform Deploy"]
        types:
            -   completed
jobs:
    Deploying_app:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v2
                with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: us-east-1
            -   name: Setup Terraform
                uses: hashicorp/setup-terraform@v3
            -   name: Get EC2 IP from Terraform
                working-directory: ./terraform
                run: |
                    terraform init -input=false
                    if terraform output -raw elastic_ip > /tmp/ip.txt 2>/dev/null; then
                        IP=$(cat /tmp/ip.txt)
                        echo "EC2_IP=$IP" >> $GITHUB_ENV
                        echo "$IP"
                    else
                        echo "No infra found."
                        exit 1
                    fi
                
            -   name: Setup SSH
                run: |
                    mkdir -p ~/.ssh
                    echo "${{ secrets.SSH_PRIVATE_EC2_KEY}} > ~/.ssh/id_rsa
                    chmod 600 ~/.ssh/id_rsa
                    ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts"
            -   name: Copy files
                run: |
                    scp -r software/* ubuntu@$EC2_IP:/app/
            -   name: Deploy containers
                run: |
                    ssh ubuntu@EC2_IP << 'EOF'
                    if ! command -v docker &> /dev/null
                    then
                        apt-get update -y
                        apt-get install -y docker.io docker-compose-plugin
                        systemctl start docker
                    fi

                    cd /app

                    docker compose down || true
                    docker compose up -d --build

                    docker image prune -f

                    EOF
