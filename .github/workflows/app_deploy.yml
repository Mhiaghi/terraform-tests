name: App deploy

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Terraform Deploy"]
        types:
            -   completed
jobs:
    Deploying_app:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v2
                with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: us-east-1
            -   name: Setup Terraform
                uses: hashicorp/setup-terraform@v3
            -   name: Get Instance ID
                working-directory: ./terraform
                run: |
                    terraform init
                    INSTANCE_ID=$(terraform output -raw instance_id)
                    echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
            -   name: Wait for SSH
                run: |
                    for i in {1..30}; do
                        STATUS=$(aws ssm describe-instance-information \
                        --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus" \
                        --output text)
                        if [ "$STATUS" = "Online" ]; then
                            echo "SSM ready"
                            exit 0
                        fi
                        echo "Waiting SSM..."
                        sleep 10
                    done
                    echo "SSM not ready"
                    exit 1
            -   name: Wait for docker compose to appear
                run: | 
                    aws ssm send-command \
                    --instance-ids $INSTANCE_ID \
                    --document-name "AWS-RunShellScript" \
                    --parameters commands='[
                        "echo Waiting for docker daemon...",
                        "until sudo docker info > /dev/null 2>&1; do sleep 5; echo Waiting for docker daemon...; done",
                        "echo Waiting for docker compose...",
                        "until docker compose version > /dev/null 2>&1; do sleep 5; echo Waiting for docker compose...; done",
                        "echo Docker compose is ready"
                    ]' \
                    --output text
            -   name: Send commands via SSH
                run: |
                    aws ssm send-command \
                    --instance-ids $INSTANCE_ID \
                    --document-name "AWS-RunShellScript" \
                    --parameters commands='[
                        "git clone --no-checkout https://github.com/${{ github.repository }} /app",
                        "cd /app && git sparse-checkout init --cone",
                        "cd /app && git sparse-checkout set software",
                        "cd /app/software && sudo docker compose down || true",
                        "cd /app/software && sudo docker compose up -d --build"
                    ]' \
                    --output text
